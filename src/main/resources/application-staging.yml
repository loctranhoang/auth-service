spring:
  datasource:
    url: jdbc:postgresql://staging-db:5432/auth_staging
    driver-class-name: org.postgresql.Driver
    username: staginguser
    password: stagingpass
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8082
logging:
  level:
    root: WARN
