spring:
  profiles: staging
  datasource:
    url: jdbc:postgresql://staging-db-host:5432/auth_staging_db
    driver-class-name: org.postgresql.Driver
    username: staginguser
    password: stagingpassword
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8082
logging:
  level:
    root: INFO
    com.az.auth: INFO
