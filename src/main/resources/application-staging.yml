spring:
  profiles: staging
  datasource:
    url: jdbc:postgresql://staging-db-host:5432/auth_service_staging
    username: auth_staging_user
    password: ${DB_PASSWORD:staging_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8082
logging:
  level:
    root: INFO
    com.az.auth: INFO
jwt:
  secret: ${JWT_SECRET:staging_secret_key}
  expirationMs: 3600000
# Add additional staging environment configurations as needed
