spring:
  datasource:
    url: jdbc:mysql://staging-db-server:3306/auth_db
    username: staging_user
    password: staging_password
  logging:
    level:
      root: WARN
  security:
    jwt:
      secret: stagingSecretKey
      expiration: 3600
      issuer: auth-service-staging
  external:
    paymentGatewayUrl: https://staging.paymentgateway.com/payments
