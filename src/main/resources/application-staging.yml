spring:
  profiles: staging
  datasource:
    url: jdbc:postgresql://staging-db:5432/authdb_staging
    driver-class-name: org.postgresql.Driver
    username: staginguser
    password: stagingpassword
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
server:
  port: 8082
logging:
  level:
    root: WARN
    org.springframework.web: INFO
management:
  endpoints:
    web:
      exposure:
        include: health,info
---
