spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_dev
    driver-class-name: org.postgresql.Driver
    username: devuser
    password: devpass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8081
logging:
  level:
    root: INFO
    org.springframework.web: DEBUG