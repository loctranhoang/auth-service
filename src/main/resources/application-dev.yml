spring:
  profiles: dev
  datasource:
    url: jdbc:postgresql://dev-db-host:5432/auth_dev_db
    driver-class-name: org.postgresql.Driver
    username: devuser
    password: devpassword
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8081
logging:
  level:
    root: INFO
    com.az.auth: DEBUG
