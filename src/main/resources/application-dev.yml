spring:
  profiles: dev
  datasource:
    url: jdbc:postgresql://dev-db-host:5432/auth_service_dev
    username: auth_dev_user
    password: ${DB_PASSWORD:dev_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8081
logging:
  level:
    root: INFO
    com.az.auth: DEBUG
jwt:
  secret: ${JWT_SECRET:dev_secret_key}
  expirationMs: 3600000
# Add additional dev environment configurations as needed
