spring:
  datasource:
    url: jdbc:postgresql://dev-db-server:5432/auth_dev
    username: dev_user
    password: dev_pass
    driver-class-name: org.postgresql.Driver
  profiles:
    active: dev
server:
  port: 8081
logging:
  level:
    root: INFO
    org.springframework: INFO
security:
  basic:
    enabled: false
application:
  name: auth-service-dev
  apiBaseUrl: https://dev.api.example.com/auth