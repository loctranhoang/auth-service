spring:
  profiles: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/authdb_dev
    driver-class-name: org.postgresql.Driver
    username: devuser
    password: devpassword
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
server:
  port: 8081
logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: health,info
---
