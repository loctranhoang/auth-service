server:
  port: 8080
spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
logging:
  level:
    root: DEBUG

# Additional properties for local environment
custom:
  api:
    key: local-api-key
  feature:
    flag: true

