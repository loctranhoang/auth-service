spring:
  profiles: local
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
server:
  port: 8080
logging:
  level:
    root: DEBUG
    org.springframework.web: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: '*'
---
