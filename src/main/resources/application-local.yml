spring:
  profiles: local
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_service_local
    username: auth_local_user
    password: ${DB_PASSWORD:local_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8080
logging:
  level:
    root: DEBUG
    org.springframework.web: DEBUG
    com.az.auth: DEBUG
jwt:
  secret: ${JWT_SECRET:local_secret_key}
  expirationMs: 3600000
# Add additional local development configurations as needed
