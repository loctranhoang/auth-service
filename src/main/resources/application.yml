# Common properties for all environments
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_db
    username: user
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
logging:
  level:
    root: INFO

---

# Local profile specific configuration
spring:
  profiles: local
  datasource:
    url: jdbc:mysql://localhost:3306/auth_db_local
    username: local_user
    password: local_password

---

# Development profile specific configuration
spring:
  profiles: dev
  datasource:
    url: jdbc:mysql://localhost:3306/auth_db_dev
    username: dev_user
    password: dev_password

---

# Staging profile specific configuration
spring:
  profiles: staging
  datasource:
    url: jdbc:mysql://localhost:3306/auth_db_staging
    username: staging_user
    password: staging_password

---

# Production profile specific configuration
spring:
  profiles: prod
  datasource:
    url: jdbc:mysql://prod-host:3306/auth_db_prod
    username: prod_user
    password: prod_password
