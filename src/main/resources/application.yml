spring:
  profiles:
    active: local

---

# Local profile configurations
spring:
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 

# Dev profile configurations
---

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/authdb
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: devuser
    password: devpass

# Staging profile configurations
---

spring:
  datasource:
    url: jdbc:mysql://staging-server:3306/authdb
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: staginguser
    password: stagingpass

# Production profile configurations
---

spring:
  datasource:
    url: jdbc:mysql://prod-server:3306/authdb
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: produser
    password: prodpass
