server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:localdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    platform: h2

# Development profile
---
spring:
  profiles: dev
  datasource:
    url: jdbc:mysql://localhost:3306/devdb
    username: devuser
    password: devpass

# Staging profile
---
spring:
  profiles: staging
  datasource:
    url: jdbc:mysql://staging-db-server:3306/stagingdb
    username: staginguser
    password: stagingpass

# Production profile
---
spring:
  profiles: prod
  datasource:
    url: jdbc:mysql://prod-db-server:3306/proddb
    username: produser
    password: prodpass
