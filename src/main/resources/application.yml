    password: dev_pass

---

# Staging Configuration
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_staging
    username: staging_user
    password: staging_pass

---

# Prod Configuration
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_prod
    username: prod_user
    password: prod_pass
