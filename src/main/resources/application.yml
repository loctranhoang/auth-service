---
# dev specific configurations
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_service_dev

# Staging environment settings
---
# staging specific configurations
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_service_staging

# Production environment settings
---
# prod specific configurations
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_service_prod
    username: prod_user
    password: prod_password