# Production environment configuration
spring:
  datasource:
    url: jdbc:postgresql://prod-db-host:5432/authdb
    username: produser
    password: prodsecret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
server:
  port: 8080
logging:
  level:
    root: WARN
    org.springframework: ERROR
management:
  endpoints:
    web:
      exposure:
        include: health,info