spring:
  profiles: prod
  datasource:
    url: jdbc:postgresql://prod-db:5432/authdb_prod
    driver-class-name: org.postgresql.Driver
    username: produser
    password: prodpassword
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
server:
  port: 8083
logging:
  level:
    root: ERROR
    org.springframework.web: WARN
management:
  endpoints:
    web:
      exposure:
        include: health
---
